<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface2: #1C2333;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --green: #00E676;
    --green-dim: rgba(0,230,118,0.12);
    --green-dim2: rgba(0,230,118,0.2);
    --red: #FF5252;
    --red-dim: rgba(255,82,82,0.12);
    --amber: #FFB300;
    --amber-dim: rgba(255,179,0,0.12);
    --blue: #448AFF;
    --blue-dim: rgba(68,138,255,0.12);
    --text: #E6EDF3;
    --text2: #8B949E;
    --text3: #555F6E;
    --radius: 10px;
    --radius-lg: 14px;
  }

  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ---- NAV ---- */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }
  .nav-logo span { color: var(--green); }
  .nav-actions { display: flex; gap: 12px; align-items: center; }

  /* ---- BUTTONS ---- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: var(--radius);
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s ease; text-decoration: none;
    line-height: 1;
  }
  .btn-primary {
    background: var(--green); color: #000;
  }
  .btn-primary:hover { background: #00c864; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border: 0.5px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger {
    background: var(--red-dim); color: var(--red);
    border: 0.5px solid rgba(255,82,82,0.3);
  }
  .btn-danger:hover { background: rgba(255,82,82,0.2); }
  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
  .btn-lg { padding: 14px 28px; font-size: 1rem; }
  .btn-full { width: 100%; justify-content: center; }

  /* ---- CARDS ---- */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
  }
  .card-sm { padding: 1rem 1.25rem; }

  /* ---- BADGE ---- */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-gray { background: rgba(139,148,158,0.12); color: var(--text2); }

  /* ---- FORMS ---- */
  .input, .select {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  .input:focus, .select:focus { border-color: var(--green); }
  .input::placeholder { color: var(--text3); }
  .label { font-size: 0.8rem; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .field { margin-bottom: 1rem; }

  /* ---- LAYOUT ---- */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
  .section { padding: 5rem 0; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
  .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; }
  .flex { display: flex; align-items: center; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mt-4 { margin-top: 4px; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 1rem; }
  .mt-24 { margin-top: 1.5rem; }
  .mt-32 { margin-top: 2rem; }
  .mb-8 { margin-bottom: 8px; }
  .mb-16 { margin-bottom: 1rem; }
  .mb-24 { margin-bottom: 1.5rem; }
  .text-center { text-align: center; }
  .text-sm { font-size: 0.85rem; }
  .text-xs { font-size: 0.75rem; }
  .text-muted { color: var(--text2); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-amber { color: var(--amber); }
  .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }

  /* ---- DIVIDER ---- */
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;

  .modal-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }

  /* ---- HERO ---- */
  .hero { padding: 6rem 0 4rem; text-align: center; }
  .hero-eyebrow {

    background: var(--green-dim2);

    padding: 6px 16px; border-radius: 20px;
    margin-bottom: 1.5rem;

  .hero-h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);

  .hero-h1 em { font-style: normal; color: var(--green); }
  .hero-sub {

  .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    border-radius: var(--radius-lg);
    padding: 1.5rem 2rem;

  .savings-ticker .label { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); font-weight: 700; margin-bottom: 4px; }
  .savings-amount {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 3rem; font-weight: 700; color: var(--green); letter-spacing: -1px;
  }
  .savings-sub { font-size: 0.82rem; color: var(--text2); margin-top: 4px; }

  /* ---- STAT CARDS ---- */
  .stat-card { text-align: center; padding: 1.5rem; }
  .stat-card .num { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
  .stat-card .stat-label { font-size: 0.82rem; color: var(--text2); margin-top: 4px; }

  /* ---- SUB ROW ---- */
  .sub-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .sub-row:hover { border-color: var(--border2); }
  .sub-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
    background: var(--surface2);

  .sub-info { flex: 1; min-width: 0; }
  .sub-name { font-weight: 600; font-size: 0.95rem; }
  .sub-meta { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
  .sub-amount {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 1rem; font-weight: 700; text-align: right;
  }
  .sub-actions { display: flex; gap: 6px; }

  /* ---- AUDIT ITEM ---- */
  .audit-item {
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 12px;
    border: 0.5px solid;
  }
  .audit-critical { background: var(--red-dim); border-color: rgba(255,82,82,0.3); }
  .audit-warning { background: var(--amber-dim); border-color: rgba(255,179,0,0.3); }
  .audit-ok { background: rgba(139,148,158,0.06); border-color: var(--border); }
  .audit-icon { font-size: 1.3rem; margin-right: 10px; }
  .audit-title { font-weight: 600; font-size: 0.95rem; }
  .audit-detail { font-size: 0.82rem; color: var(--text2); margin-top: 3px; }
  .audit-savings { font-family: 'SF Mono', monospace; font-weight: 700; font-size: 0.9rem; }

  /* ---- PLAYBOOK ---- */
  .playbook-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden; margin-bottom: 16px;
  }
  .playbook-header {
    padding: 1.25rem 1.5rem;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .playbook-header:hover { background: var(--surface2); }
  .playbook-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }
  .playbook-meta { flex: 1; }
  .playbook-name { font-weight: 700; font-size: 1rem; }
  .playbook-tagline { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
  .playbook-savings { font-family: 'SF Mono', monospace; font-weight: 700; color: var(--green); font-size: 0.9rem; }
  .playbook-body { padding: 0 1.5rem 1.5rem; }
  .playbook-section { margin-top: 1.25rem; }
  .playbook-section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .phone-box {
    background: var(--green-dim);
    border: 0.5px solid rgba(0,230,118,0.25);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-family: 'SF Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--green);
    display: inline-block; margin-bottom: 8px;

  .script-line {
    background: var(--surface2);
    border-left: 3px solid var(--green);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 10px 14px; margin-bottom: 8px;
    font-size: 0.85rem; line-height: 1.55; color: var(--text);

  .rights-item {
    display: flex; gap: 8px;

  .rights-bullet { color: var(--green); flex-shrink: 0; font-weight: 700; margin-top: 2px; }

    font-size: 0.7rem; font-weight: 800; flex-shrink: 0;

  .page-subtitle { font-size: 0.9rem; color: var(--text2); margin-top: 4px; }

  .paywall-overlay {

    border-radius: var(--radius-lg);

  .paywall-lock {

  .lock-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.5rem; }
  .lock-sub { font-size: 0.9rem; color: var(--text2); max-width: 360px; margin-bottom: 1.5rem; line-height: 1.55; }
  .price-tag {
    display: inline-flex; align-items: baseline; gap: 4px;
    background: var(--green-dim2); border: 0.5px solid rgba(0,230,118,0.4);
    border-radius: var(--radius); padding: 8px 20px; margin-bottom: 1.25rem;

  .price-amount { font-family: 'SF Mono', monospace; font-size: 2rem; font-weight: 800; color: var(--green); }
  .price-label { font-size: 0.8rem; color: var(--text2); }

  /* ---- TABS ---- */
  .tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: var(--radius); margin-bottom: 1.5rem; }
  .tab {
    flex: 1; text-align: center; padding: 8px 12px;
    border-radius: calc(var(--radius) - 2px);
    font-size: 0.85rem; font-weight: 500; cursor: pointer;
    color: var(--text2); transition: all 0.15s; border: none; background: transparent;
  }
  .tab.active { background: var(--surface); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ---- FEATURE LIST ---- */
  .feature-li { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px; }
  .feature-check { color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 2px; }

  /* ---- HOW IT WORKS ---- */
  .how-step { padding: 2rem; position: relative; }
  .step-num {
    font-family: 'SF Mono', monospace; font-size: 3rem; font-weight: 800;
    color: var(--green-dim2); line-height: 1; margin-bottom: 0.75rem;
  }
  .step-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .step-desc { font-size: 0.88rem; color: var(--text2); line-height: 1.6; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 12px 20px;
    font-size: 0.88rem; display: flex; align-items: center; gap: 10px;
    animation: slideUp 0.25s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.success { border-color: rgba(0,230,118,0.4); }
  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ---- EMPTY STATE ---- */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text2); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
  .empty-desc { font-size: 0.88rem; margin-bottom: 1.5rem; }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 640px) {
    .nav { padding: 0 1rem; }
    .container { padding: 0 1rem; }
    .hero { padding: 3rem 0 2.5rem; }
    .section { padding: 3rem 0; }
    .modal { padding: 1.5rem; }
    .sub-row { flex-wrap: wrap; }
    .savings-amount { font-size: 2.2rem; }
    .hero-h1 { font-size: 2rem; }
    .playbook-body { padding: 0 1rem 1rem; }
    .playbook-header { padding: 1rem; }
  }

  /* ---- UTILITY ---- */
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  hr.divider { border: none; border-top: 0.5px solid var(--border); }
</style>
</head>

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function fmtMoney(n) {
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function yearlyAmount(amount, freq) {
  if (freq === 'weekly') return amount * 52;
  if (freq === 'monthly') return amount * 12;
  if (freq === 'quarterly') return amount * 4;
  if (freq === 'yearly') return amount * 1;
  return amount * 12;
}

function monthlyAmount(amount, freq) {
  return yearlyAmount(amount, freq) / 12;
}

function getCategoryEmoji(catId) {
  return CATEGORIES.find(c => c.id === catId)?.emoji || '📦';
}

// Determine if a subscription looks dormant / creeping
function auditSub(sub) {
  const issues = [];
  const monthly = monthlyAmount(sub.amount, sub.freq);

  // Duplicate-name detection happens at app level
  if (sub.lastUsed === 'over3months') {
    issues.push({ type: 'dormant', severity: 'critical', label: 'Dormant', detail: 'You haven\'t used this in 3+ months', savings: monthly });
  }
  if (sub.lastUsed === 'over1month') {
    issues.push({ type: 'low-use', severity: 'warning', label: 'Low usage', detail: 'Used less than once this month', savings: monthly * 0.5 });
  }
  if (monthly > 100) {
    issues.push({ type: 'high-cost', severity: 'warning', label: 'High cost', detail: `${fmtMoney(monthly)}/mo — likely negotiable`, savings: monthly * 0.3 });
  }
  if (['internet','mobile','insurance','gym'].includes(sub.category)) {
    issues.push({ type: 'negotiable', severity: 'warning', label: 'Negotiable', detail: 'This type of bill is almost always negotiable', savings: monthly * 0.25 });
  }
  if (sub.freq === 'yearly' && sub.amount > 50) {
    issues.push({ type: 'yearly', severity: 'warning', label: 'Annual auto-renewal', detail: 'Yearly charges sneak up — set a cancellation reminder', savings: 0 });
  }
  return issues;
}

        </div>
      )}

      {subs.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">📋</div>
          <div className="empty-title">No subscriptions yet</div>
          <div className="empty-desc">Add the recurring charges you pay each month — streaming, phone, internet, insurance, anything.</div>
          <button className="btn btn-primary" onClick={() => setShowAdd(true)}>Add your first subscription</button>
        </div>
      ) : (
        <>
          {filtered.map(s => {
            const monthly = monthlyAmount(s.amount, s.freq);
            const issues = auditSub(s);
            const worstIssue = issues.find(i => i.severity === 'critical') || issues[0];
            return (
              <div className="sub-row" key={s.id}>
                <div className="sub-icon">{s.emoji || getCategoryEmoji(s.category)}</div>
                <div className="sub-info">
                  <div className="flex gap-8">
                    <span className="sub-name">{s.name}</span>
                    {worstIssue && (
                      <span className={`badge ${worstIssue.severity === 'critical' ? 'badge-red' : 'badge-amber'}`}>
                        {worstIssue.label}
                      </span>
                    )}
                  </div>
                  <div className="sub-meta">
                    {fmtMoney(s.amount)}/{s.freq} · {CATEGORIES.find(c => c.id === s.category)?.label || s.category}
                    {monthly !== s.amount && ` · ${fmtMoney(monthly)}/mo`}
                  </div>
                </div>
                <div className="sub-amount" style={{ color: worstIssue?.severity === 'critical' ? 'var(--red)' : 'var(--text)' }}>
                  {fmtMoney(monthly)}<span className="text-muted" style={{ fontSize: '0.72rem', fontWeight: 400 }}>/mo</span>
                </div>
                <div className="sub-actions">
                  <button className="btn btn-ghost btn-sm" onClick={() => setDeleteTarget(s)} title="Remove">✕</button>
                </div>
              </div>
            );
          })}

          <hr className="divider" />
          <div style={{ textAlign: 'center', marginTop: '1.5rem' }}>
            <button className="btn btn-primary btn-lg" onClick={() => onNavigate('audit')}>
              Run full audit →
            </button>
            <p className="text-xs text-muted mt-8">Takes 30 seconds · Shows exactly where you can cut</p>
          </div>
        </>
      )}

      {showAdd && <AddSubModal onClose={() => setShowAdd(false)} onAdd={addSub} />}
      {deleteTarget && <DeleteConfirmModal sub={deleteTarget} onConfirm={removeSub} onClose={() => setDeleteTarget(null)} />}
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

function AuditPage({ subs, onNavigate, isPaid, onUpgrade }) {
  const allIssues = [];
  let totalPotential = 0;
  const dormant = subs.filter(s => s.lastUsed === 'over3months');
  const lowUse = subs.filter(s => s.lastUsed === 'over1month');
  const negotiable = subs.filter(s => ['internet','mobile','insurance','gym','medical'].includes(s.category));

  subs.forEach(s => {
    const issues = auditSub(s);
    issues.forEach(issue => {
      allIssues.push({ ...issue, sub: s });
      totalPotential += issue.savings || 0;
    });
  });

  const critical = allIssues.filter(i => i.severity === 'critical');
  const warnings = allIssues.filter(i => i.severity === 'warning');

  if (subs.length === 0) {
    return (
      <div className="container" style={{ paddingBottom: '4rem' }}>
        <div className="page-header">
          <h1 className="page-title">Audit</h1>
          <p className="page-subtitle">Add subscriptions to your dashboard first</p>
        </div>
        <div className="empty">
          <div className="empty-icon">🔍</div>
          <div className="empty-title">Nothing to audit yet</div>
          <div className="empty-desc">Add your subscriptions first, then we'll scan for savings opportunities.</div>
          <button className="btn btn-primary" onClick={() => onNavigate('dashboard')}>Go to dashboard →</button>
        </div>
      </div>
    );
  }

  return (
    <div className="container" style={{ paddingBottom: '4rem' }}>
      <div className="page-header">
        <div className="flex-between">
          <div>
            <h1 className="page-title">Audit results</h1>
            <p className="page-subtitle">{allIssues.length} findings across {subs.length} subscriptions</p>
          </div>
          <div className="savings-ticker" style={{ margin: 0, padding: '1rem 1.5rem' }}>
            <div className="label">Potential savings</div>
            <div className="savings-amount mono" style={{ fontSize: '2rem' }}>{fmtMoney(totalPotential)}/mo</div>
          </div>
        </div>
      </div>

      {critical.length > 0 && (
        <div style={{ marginBottom: '2rem' }}>
          <div style={{ fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--red)', marginBottom: '0.75rem' }}>
            🚨 Cut immediately ({critical.length})
          </div>
          {critical.map((i, idx) => (
            <div className="audit-item audit-critical" key={idx}>
              <div className="flex-between">
                <div className="flex gap-12">
                  <span style={{ fontSize: '1.2rem' }}>{i.sub.emoji}</span>
                  <div>
                    <div className="audit-title">{i.sub.name}</div>
                    <div className="audit-detail">{i.detail}</div>
                  </div>
                </div>
                <div>
                  <div className="audit-savings text-red">{fmtMoney(i.savings)}/mo</div>
                  <div className="text-xs text-muted" style={{ textAlign: 'right' }}>to save</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {warnings.length > 0 && (
        <div style={{ marginBottom: '2rem' }}>
          <div style={{ fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--amber)', marginBottom: '0.75rem' }}>
            ⚡ Worth negotiating ({warnings.length})
          </div>
          {warnings.map((i, idx) => (
            <div className="audit-item audit-warning" key={idx}>
              <div className="flex-between">
                <div className="flex gap-12">
                  <span style={{ fontSize: '1.2rem' }}>{i.sub.emoji}</span>
                  <div>
                    <div className="audit-title">{i.sub.name} — <span className="text-amber">{i.label}</span></div>
                    <div className="audit-detail">{i.detail}</div>
                  </div>
                </div>
                {i.savings > 0 && (
                  <div>
                    <div className="audit-savings text-amber">~{fmtMoney(i.savings)}/mo</div>
                    <div className="text-xs text-muted" style={{ textAlign: 'right' }}>potential</div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {allIssues.length === 0 && (
        <div className="card" style={{ textAlign: 'center', padding: '3rem' }}>
          <div style={{ fontSize: '2.5rem', marginBottom: '0.75rem' }}>✅</div>
          <div style={{ fontWeight: 700, marginBottom: '0.5rem' }}>No obvious issues found</div>
          <p className="text-muted text-sm">Your subscriptions look clean — but the negotiation playbooks below can still lower your bills even if nothing flagged as a problem.</p>
        </div>
      )}

      <hr className="divider" />

      <div style={{ textAlign: 'center', padding: '1.5rem 0' }}>
        {negotiable.length > 0 && (
          <p className="text-sm text-muted" style={{ marginBottom: '1rem' }}>
            You have <strong style={{ color: 'var(--text)' }}>{negotiable.length} bill{negotiable.length !== 1 ? 's' : ''}</strong> that can likely be negotiated lower.
          </p>
        )}
        <button className="btn btn-primary btn-lg" onClick={() => onNavigate('negotiate')}>
          See negotiation playbooks →
        </button>
      </div>
    </div>
  );
}

function PlaybookContent({ p }) {
  return (
    <div className="playbook-body">
      <div className="playbook-section">
        <div className="playbook-section-title">📞 Call this number</div>
        <div className="phone-box">{p.phone}</div>
        {p.phone2 && <div className="text-xs text-muted" style={{ marginTop: 4 }}>{p.phone2}</div>}
      </div>

      <div className="playbook-section">
        <div className="playbook-section-title">💬 What to say — word for word</div>
        {p.scripts.map((s, i) => (
          <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 8, alignItems: 'flex-start' }}>
            <div className="step-pill">{i + 1}</div>
            <div className="script-line" style={{ flex: 1 }}>{s}</div>
          </div>
        ))}
      </div>

      <div className="playbook-section">
        <div className="playbook-section-title">⚡ Pro tips</div>
        {p.tips.map((t, i) => (
          <div className="rights-item" key={i}>
            <span className="rights-bullet">→</span>
            <span>{t}</span>
          </div>
        ))}
      </div>

      <div className="playbook-section">
        <div className="playbook-section-title">⚖️ Know your rights</div>
        {p.rights.map((r, i) => (
          <div className="rights-item" key={i}>
            <span className="rights-bullet">✓</span>
            <span>{r}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function NegotiatePage({ subs, isPaid, onUpgrade }) {
  const [open, setOpen] = useState(null);
  const [savedMap, setSavedMap] = useState({});

  const totalSaved = Object.values(savedMap).reduce((a, b) => a + b, 0);

  return (
    <div className="container" style={{ paddingBottom: '4rem' }}>
      <div className="page-header">
        <div className="flex-between" style={{ flexWrap: 'wrap', gap: '1rem' }}>
          <div>
            <h1 className="page-title">Negotiation playbooks</h1>
            <p className="page-subtitle">Scripts, phone numbers, and your rights — for every bill</p>
          </div>
          {totalSaved > 0 && (
            <div className="savings-ticker" style={{ margin: 0, padding: '1rem 1.5rem' }}>
              <div className="label">You've saved</div>
              <div className="savings-amount mono" style={{ fontSize: '1.75rem' }}>{fmtMoney(totalSaved)}/mo</div>
            </div>
          )}
        </div>
      </div>

      {!isPaid ? (
        <div>
          <div style={{ background: 'var(--green-dim)', border: '0.5px solid rgba(0,230,118,0.25)', borderRadius: 'var(--radius-lg)', padding: '1.25rem 1.5rem', marginBottom: '1.5rem', display: 'flex', gap: '1rem', alignItems: 'center' }}>
            <span style={{ fontSize: '1.5rem' }}>👋</span>
            <div>
              <div style={{ fontWeight: 600, marginBottom: '2px' }}>First playbook is free</div>
              <div className="text-sm text-muted">Preview the Internet / Cable playbook below. Unlock all 6 for $39.</div>
            </div>
          </div>

          {PLAYBOOKS.map((p, idx) => {
            const isLocked = idx > 0 && !isPaid;
            const isOpen = open === p.id;
            return (
              <div className="playbook-card" key={p.id}>
                <div className="playbook-header" onClick={() => !isLocked && setOpen(isOpen ? null : p.id)}>
                  <div className="playbook-icon" style={{ background: p.colorDim }}>
                    <span style={{ fontSize: '1.3rem' }}>{p.emoji}</span>
                  </div>
                  <div className="playbook-meta">
                    <div className="playbook-name">{p.name}</div>
                    <div className="playbook-tagline">{p.tagline}</div>
                  </div>
                  <div style={{ textAlign: 'right', flexShrink: 0 }}>
                    <div className="playbook-savings">{p.savings}</div>
                    {isLocked ? (
                      <span style={{ fontSize: '1.1rem' }}>🔒</span>
                    ) : (
                      <span style={{ fontSize: '0.8rem', color: 'var(--text3)' }}>{isOpen ? '▲' : '▼'}</span>
                    )}
                  </div>
                </div>
                {isLocked ? null : isOpen && <PlaybookContent p={p} />}
              </div>
            );
          })}

          <div style={{ background: 'var(--surface2)', border: '1px dashed var(--border2)', borderRadius: 'var(--radius-lg)', padding: '2.5rem', textAlign: 'center', marginTop: '0.5rem' }}>
            <div style={{ fontSize: '2rem', marginBottom: '0.75rem' }}>🔒</div>
            <div style={{ fontWeight: 700, fontSize: '1.2rem', marginBottom: '0.5rem' }}>5 more playbooks locked</div>
            <p className="text-muted text-sm" style={{ marginBottom: '1.5rem', maxWidth: '400px', margin: '0 auto 1.5rem', lineHeight: 1.6 }}>
              Unlock Mobile, Insurance, Medical Bills, Streaming, and Gym playbooks — plus all scripts, phone numbers, and Know Your Rights sections.
            </p>
            <div className="price-tag" style={{ display: 'inline-flex', marginBottom: '1.25rem' }}>
              <span className="price-amount">$39</span>
              <span className="price-label" style={{ alignSelf: 'flex-end', marginLeft: 8, marginBottom: 4 }}>one-time</span>
            </div>
            <br />
            <button className="btn btn-primary btn-lg" onClick={onUpgrade}>Unlock all 6 playbooks →</button>
            <p className="text-xs text-muted mt-8">Secure checkout via Stripe · Instant access</p>
          </div>
        </div>
      ) : (
        <div>
          {PLAYBOOKS.map(p => {
            const isOpen = open === p.id;
            return (
              <div className="playbook-card" key={p.id}>
                <div className="playbook-header" onClick={() => setOpen(isOpen ? null : p.id)}>
                  <div className="playbook-icon" style={{ background: p.colorDim }}>
                    <span style={{ fontSize: '1.3rem' }}>{p.emoji}</span>
                  </div>
                  <div className="playbook-meta">
                    <div className="playbook-name">{p.name}</div>
                    <div className="playbook-tagline">{p.tagline}</div>
                  </div>
                  <div style={{ textAlign: 'right', flexShrink: 0 }}>
                    <div className="playbook-savings">{p.savings}</div>
                    <span style={{ fontSize: '0.8rem', color: 'var(--text3)' }}>{isOpen ? '▲' : '▼'}</span>
                  </div>
                </div>
                {isOpen && (
                  <>
                    <PlaybookContent p={p} />
                    <div style={{ padding: '0 1.5rem 1.5rem' }}>
                      <hr className="divider" />
                      <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
                        <span className="text-sm text-muted">Did this work?</span>
                        {[15, 25, 40, 60, 80].map(amt => (
                          <button key={amt} className="btn btn-ghost btn-sm"
                            style={savedMap[p.id] === amt ? { borderColor: 'var(--green)', color: 'var(--green)' } : {}}
                            onClick={() => setSavedMap(m => ({ ...m, [p.id]: amt }))}>
                            Saved ${amt}/mo
                          </button>
                        ))}
                        <button className="btn btn-ghost btn-sm" onClick={() => {
                          const n = prompt('How much did you save per month? ($)');
                          if (n && !isNaN(n)) setSavedMap(m => ({ ...m, [p.id]: parseFloat(n) }));
                        }}>Other amount</button>
                        {savedMap[p.id] && <span className="badge badge-green">+{fmtMoney(savedMap[p.id])}/mo saved ✓</span>}
                      </div>
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('landing');
  const [subs, setSubs] = useLocalStorage('recurr_subs', []);
  const [isPaid, setIsPaid] = useLocalStorage('recurr_paid', false);
  const [showUpgrade, setShowUpgrade] = useState(false);

  const totalMonthly = subs.reduce((sum, s) => sum + monthlyAmount(s.amount, s.freq), 0);
  const estimatedSavings = totalMonthly * 0.3 * 12;

  const NAV_ITEMS = [
    { id: 'dashboard', label: 'Dashboard' },
    { id: 'audit', label: 'Audit' },
    { id: 'negotiate', label: 'Playbooks' },
  ];

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo" style={{ cursor: 'pointer' }} onClick={() => setPage('landing')}>
          Recurr<span>.</span>
        </div>
        {page !== 'landing' && (
          <div style={{ display: 'flex', gap: 2 }}>
            {NAV_ITEMS.map(n => (
              <button
                key={n.id}
                className="btn btn-ghost btn-sm"
                style={page === n.id ? { color: 'var(--text)', borderColor: 'var(--border2)' } : {}}
                onClick={() => setPage(n.id)}
              >
                {n.label}
              </button>
            ))}
          </div>
        )}
        <div className="nav-actions">
          {page === 'landing' ? (
            <button className="btn btn-primary btn-sm" onClick={() => setPage('dashboard')}>Start free audit</button>
          ) : !isPaid ? (
            <button className="btn btn-primary btn-sm" onClick={() => setShowUpgrade(true)}>Unlock playbooks — $39</button>
          ) : (
            <span className="badge badge-green">✓ Unlocked</span>
          )}
        </div>
      </nav>

      {page === 'landing' && <LandingPage onStart={() => setPage('dashboard')} />}
      {page === 'dashboard' && <DashboardPage subs={subs} setSubs={setSubs} onNavigate={setPage} isPaid={isPaid} />}
      {page === 'audit' && <AuditPage subs={subs} onNavigate={setPage} isPaid={isPaid} onUpgrade={() => setShowUpgrade(true)} />}
      {page === 'negotiate' && <NegotiatePage subs={subs} isPaid={isPaid} onUpgrade={() => setShowUpgrade(true)} />}

      {showUpgrade && (
        <UpgradeModal
          onClose={() => setShowUpgrade(false)}
          estimatedSavings={estimatedSavings}
        />
      )}

      {/* DEV TOGGLE — remove before launch */}
      {page !== 'landing' && (
        <div style={{ position: 'fixed', bottom: '1rem', left: '1rem', zIndex: 50 }}>
          <button
            className="btn btn-ghost btn-sm"
            style={{ fontSize: '0.72rem', opacity: 0.5 }}
            onClick={() => setIsPaid(p => !p)}
          >
            {isPaid ? '🔓 paid' : '🔒 free'} (dev toggle)
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
